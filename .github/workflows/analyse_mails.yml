name: IneArt — Analyse mails & Devis Odoo

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode execution'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - dry-run

permissions:
  contents: write

jobs:
  analyser-mails:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Telecharger le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Analyser les mails
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "dry-run" ]; then
            python analyseur_mails.py --dry-run
          else
            python analyseur_mails.py
          fi

      - name: Sauvegarder mails.json
        if: github.event.inputs.mode != 'dry-run'
        run: |
          git config user.name "IneArt AI Bot"
          git config user.email "actions@github.com"
          git add mails.json
          git diff --cached --quiet || git commit -m "Mise a jour mails.json $(date '+%d/%m/%Y %H:%M')"
          git push
