name: IneArt — Analyse mails & Devis Odoo

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode execution'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - dry-run

jobs:
  analyser-mails:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Analyser les mails
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_PASS: ${{ secrets.ODOO_PASS }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "dry-run" ]; then
            python analyseur_mails.py --dry-run
          else
            python analyseur_mails.py --now
          fi
